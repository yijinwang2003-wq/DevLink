name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check backend/app
      - run: ruff format --check backend/app

  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: devlink
          POSTGRES_PASSWORD: devlink
          POSTGRES_DB: devlink_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql+asyncpg://devlink:devlink@localhost:5432/devlink_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci_test_secret_key_32_chars_long_x
      OPENAI_API_KEY: sk-fake-for-tests

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements.txt
      - run: |
          cd backend
          alembic upgrade head
          pytest --cov=app --cov-report=xml --cov-fail-under=70 -v

      - uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - run: docker build ./backend -t devlink-backend:ci
